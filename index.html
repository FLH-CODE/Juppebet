<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juppebet VM 2026 - Kluster & Statistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; overflow: hidden; }
        
        #app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidopanel */
        #sidebar {
            width: 350px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        /* Huvudinnehåll (Graf eller Statistik) */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #0f172a;
        }

        #graph-wrapper { flex: 1; cursor: grab; position: relative; }
        #graph-wrapper:active { cursor: grabbing; }
        #stats-wrapper { flex: 1; overflow-y: auto; display: none; padding: 2rem; background-color: #0f172a; }

        /* D3 Noder och Länkar */
        .link { stroke: #475569; stroke-opacity: 0.4; transition: stroke-opacity 0.2s, stroke 0.2s; }
        .node circle { stroke: #1e293b; stroke-width: 2px; cursor: pointer; transition: stroke-width 0.2s, stroke 0.2s, fill 0.2s, transform 0.2s; }
        .node circle:hover { stroke: #fff !important; stroke-width: 4px; }
        .node text { font-size: 12px; font-weight: 500; fill: #f8fafc; pointer-events: none; text-shadow: 0px 2px 4px rgba(0,0,0,0.8), 0px 0px 2px rgba(0,0,0,0.8); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .stat-bar { transition: width 1s ease-out; }
    </style>
</head>
<body>

<div id="app-container">
    <!-- Sidopanel -->
    <div id="sidebar">
        <h1 class="text-2xl font-bold text-white mb-1 tracking-tight">Juppebet 2026</h1>
        <p class="text-xs text-slate-400 mb-6 border-b border-slate-700 pb-4">Klusteranalys & Statistik</p>

        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">1. Ladda upp tips (Excel/CSV)</label>
            <input type="file" id="file-input" accept=".csv, .xlsx, .xls" class="block w-full text-xs text-slate-400
                file:mr-3 file:py-2 file:px-3
                file:rounded-md file:border-0
                file:text-xs file:font-semibold
                file:bg-sky-500 file:text-white
                hover:file:bg-sky-600 file:cursor-pointer transition-colors bg-slate-800 rounded-md border border-slate-700">
        </div>

        <div class="mb-4 bg-slate-800/50 p-3 rounded-lg border border-slate-700">
            <label class="block text-sm font-medium text-sky-400 mb-2">2. Filtrera sektioner i grafen</label>
            <div class="space-y-1.5 grid grid-cols-2 gap-x-2">
                <label class="flex items-center text-xs text-slate-300 cursor-pointer col-span-2 mb-1 pb-1 border-b border-slate-700">
                    <input type="checkbox" id="f-group" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Gruppspel (1X2)
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-16del" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> 16-delsfinal
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-8del" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Åttondelsfinal
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-kvarts" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Kvartsfinal
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-semi" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Semifinal
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-final" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Final
                </label>
                <label class="flex items-center text-xs text-slate-300 cursor-pointer">
                    <input type="checkbox" id="f-vinnare" checked class="mr-2 filter-cb rounded text-sky-500 bg-slate-700 border-slate-600"> Vinnare
                </label>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-300 mb-2">3. Tröskelvärde för kluster</label>
            <input type="range" id="threshold-slider" min="0" max="100" value="35" class="w-full accent-sky-500">
            <div class="flex justify-between text-xs text-slate-400 mt-1">
                <span>0%</span>
                <span id="threshold-label" class="font-bold text-sky-400">Minst 35% likhet</span>
                <span>100%</span>
            </div>
        </div>

        <div class="bg-slate-800 rounded-lg p-3 mb-2 border border-slate-700 shadow-inner flex-1 overflow-y-auto">
            <h2 class="text-xs font-semibold text-sky-400 mb-2 uppercase tracking-wider">Spelardata</h2>
            <div id="stats-content" class="text-sm text-slate-300">
                <p class="italic text-slate-500 text-xs">Ladda upp fil. Klicka på en spelare i grafen för info.</p>
            </div>
        </div>
    </div>

    <!-- Huvudinnehåll -->
    <div id="main-content">
        <!-- Tab Navigation -->
        <div class="bg-slate-800 border-b border-slate-700 flex items-center px-4 py-3 gap-4 shadow-sm z-10">
            <button id="btn-tab-graph" class="px-4 py-2 bg-sky-500 text-white text-sm font-semibold rounded-md shadow focus:outline-none transition-colors">
                Kluster (Graf)
            </button>
            <button id="btn-tab-stats" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold rounded-md transition-colors">
                Vanligaste Gissningarna
            </button>
        </div>

        <!-- Graf -->
        <div id="graph-wrapper"></div>
        
        <!-- Statistik -->
        <div id="stats-wrapper">
            <div id="stats-dashboard" class="max-w-6xl mx-auto">
                <p class="text-slate-400 italic">Ladda upp en fil för att se statistik.</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal Overlay för Jämförelser & Röst-detaljer -->
<div id="app-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 transition-opacity">
    <div class="bg-slate-800 rounded-xl border border-slate-600 shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50 rounded-t-xl">
            <h2 id="modal-title" class="text-lg font-bold text-white">Titel</h2>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-700 hover:bg-slate-600 rounded-full w-8 h-8 flex items-center justify-center transition-colors">✕</button>
        </div>
        <div id="modal-content" class="p-5 overflow-y-auto text-slate-300 text-sm space-y-4">
            <!-- Dynamiskt innehåll hamnar här -->
        </div>
    </div>
</div>

<script>
    // --- State ---
    let participants = []; 
    let rowLabels = { group:[], '16del':[], '8del':[], kvarts:[], semi:[], final:[], vinnare:[] };
    
    let linksData = []; 
    let allLinks = []; 
    let simulation;
    let svg, g, link, node;
    let colorScale = d3.scaleOrdinal(d3.schemeCategory10);
    
    let selectedNodeId = null;
    let hoveredNodeId = null;

    // --- DOM Element ---
    const filterCheckboxes = document.querySelectorAll('.filter-cb');
    const thresholdSlider = document.getElementById('threshold-slider');
    const thresholdLabel = document.getElementById('threshold-label');
    const statsContent = document.getElementById('stats-content');
    const graphWrapper = document.getElementById('graph-wrapper');
    const statsWrapper = document.getElementById('stats-wrapper');
    const statsDashboard = document.getElementById('stats-dashboard');

    const btnTabGraph = document.getElementById('btn-tab-graph');
    const btnTabStats = document.getElementById('btn-tab-stats');
    
    const modal = document.getElementById('app-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalContent = document.getElementById('modal-content');

    // --- Event Listeners ---
    document.getElementById('file-input').addEventListener('change', handleFileUpload);
    
    thresholdSlider.addEventListener('input', (e) => {
        thresholdLabel.innerText = `Minst ${e.target.value}% likhet`;
        if (participants.length > 0) updateGraphThreshold();
    });

    filterCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('change', () => {
            if (participants.length > 0) {
                recalculateLinks();
                updateGraphThreshold();
                if(selectedNodeId) {
                    const selNode = participants.find(p => p.id === selectedNodeId);
                    if(selNode) selectNodeFromSidebar(selectedNodeId);
                }
            }
        });
    });

    // Tab-hantering
    btnTabGraph.addEventListener('click', () => {
        btnTabGraph.className = "px-4 py-2 bg-sky-500 text-white text-sm font-semibold rounded-md shadow focus:outline-none transition-colors";
        btnTabStats.className = "px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold rounded-md transition-colors";
        graphWrapper.style.display = 'block';
        statsWrapper.style.display = 'none';
        if(participants.length > 0) updateGraphThreshold(); 
    });

    btnTabStats.addEventListener('click', () => {
        btnTabStats.className = "px-4 py-2 bg-sky-500 text-white text-sm font-semibold rounded-md shadow focus:outline-none transition-colors";
        btnTabGraph.className = "px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold rounded-md transition-colors";
        graphWrapper.style.display = 'none';
        statsWrapper.style.display = 'block';
        if(participants.length > 0) generateStatsDashboard();
    });

    window.addEventListener('resize', () => {
        if (!svg || graphWrapper.style.display === 'none') return;
        const width = graphWrapper.clientWidth || 800;
        const height = graphWrapper.clientHeight || 600;
        svg.attr("width", width).attr("height", height);
        if(simulation) {
            simulation.force("center", d3.forceCenter(width / 2, height / 2));
            simulation.alpha(0.3).restart();
        }
    });

    // --- Modal logik ---
    function openModal(title, html) {
        modalTitle.innerHTML = title;
        modalContent.innerHTML = html;
        modal.classList.remove('hidden');
    }

    function closeModal() {
        modal.classList.add('hidden');
    }

    modal.addEventListener('click', (e) => {
        if(e.target === modal) closeModal();
    });

    // --- Auto-Ladda Fil ---
    const DEFAULT_FILENAME = "Juppebet VM 2026_Sammansatt.xlsx"; 

    async function autoLoadFile() {
        statsContent.innerHTML = `<p class="text-sky-400 animate-pulse text-xs">Försöker ladda ${DEFAULT_FILENAME} automatiskt...</p>`;
        statsDashboard.innerHTML = `<p class="text-sky-400 animate-pulse">Försöker ladda ${DEFAULT_FILENAME} automatiskt...</p>`;
        
        try {
            const response = await fetch(DEFAULT_FILENAME);
            if (!response.ok) throw new Error("Kunde inte hämta filen.");
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: "", raw: false});
            
            processData(json);
        } catch (err) {
            console.warn("Auto-load misslyckades. Ladda upp filen manuellt.", err);
            statsContent.innerHTML = `<p class="italic text-slate-500 text-xs">Webbläsarens säkerhet blockerar lokala filer. Välj filen manuellt ovan!</p>`;
            statsDashboard.innerHTML = `<p class="text-slate-400 italic">Ladda upp filen manuellt för att se statistik.</p>`;
        }
    }

    window.addEventListener('DOMContentLoaded', autoLoadFile);

    // --- Filhantering (Manuell fallback) ---
    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        statsContent.innerHTML = '<p class="text-sky-400 animate-pulse text-xs">Analyserar fil...</p>';
        statsDashboard.innerHTML = '<p class="text-sky-400 animate-pulse">Beräknar statistik...</p>';

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, defval: "", raw: false});
                processData(json);
            } catch (err) {
                console.error(err);
                statsContent.innerHTML = `<p class="text-red-400 text-xs">Fel: ${err.message}</p>`;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // --- Data Processering ---
    function processData(rows) {
        if (!rows || rows.length === 0) return;

        try {
            rowLabels = { group:[], '16del':[], '8del':[], kvarts:[], semi:[], final:[], vinnare:[] };
            
            // Hitta namnraden
            let nameRowIdx = -1;
            let maxNames = 0;
            
            for (let i = 0; i < Math.min(25, rows.length); i++) {
                const row = rows[i];
                if(!row) continue;
                let nameCount = 0;
                for(let j = 0; j < row.length; j++) {
                    const cellStr = String(row[j]).trim().toLowerCase();
                    if (cellStr.length > 1 && !["1 x 2", "1x2", "resultat", "gruppspel", "datum", "grupp"].includes(cellStr)) nameCount++;
                }
                if (nameCount > maxNames) { maxNames = nameCount; nameRowIdx = i; }
            }

            if (nameRowIdx === -1) {
                statsContent.innerHTML = '<p class="text-red-400 text-xs">Kunde inte hitta namn.</p>';
                return;
            }

            participants = [];
            const nameRow = rows[nameRowIdx];
            
            for (let c = 1; c < nameRow.length; c++) {
                const name = nameRow[c] ? String(nameRow[c]).trim() : "";
                const s = name.toLowerCase();
                if (name && !["1 x 2", "1x2", "resultat", "gruppspel", "datum", "grupp"].includes(s) && name.length > 1) {
                    participants.push({ 
                        id: name, name: name, colIdx: c, 
                        guesses: { group:[], '16del':[], '8del':[], kvarts:[], semi:[], final:[], vinnare:[] } 
                    });
                }
            }
            
            if (participants.length === 0) {
                statsContent.innerHTML = '<p class="text-red-400 text-xs">Inga deltagare hittades.</p>';
                return;
            }

            const firstPCol = Math.max(1, participants[0].colIdx); 
            let currentSection = 'group';

            for (let r = nameRowIdx + 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row) continue;
                
                const rowTextFull = row.slice(0, firstPCol).join(" ").toLowerCase();
                
                if (rowTextFull.includes("16-del") || rowTextFull.includes("sextondel")) currentSection = '16del';
                else if (rowTextFull.includes("åttondel") || rowTextFull.includes("8-del")) currentSection = '8del';
                else if (rowTextFull.includes("kvarts")) currentSection = 'kvarts';
                else if (rowTextFull.includes("semi")) currentSection = 'semi';
                else if (rowTextFull.includes("vinner") || rowTextFull.includes("segrare") || rowTextFull.includes("mästare")) currentSection = 'vinnare';
                else if (rowTextFull.includes("final") && !rowTextFull.includes("16") && !rowTextFull.includes("8") && !rowTextFull.includes("kvarts") && !rowTextFull.includes("semi")) currentSection = 'final';
                else if (rowTextFull.includes("gruppspel")) currentSection = 'group';

                let rowHasData = false;
                let tempGuesses = {};

                for(let p of participants) {
                    const val = row[p.colIdx];
                    if(val) {
                        const cleanVal = String(val).trim().toLowerCase();
                        if (cleanVal !== "" && cleanVal !== "1 x 2" && cleanVal !== "1x2") {
                            rowHasData = true;
                            // Fix: Säkerställ att 'FRANKRIKE', 'Frankrike' och ' frankrike ' matchas exakt
                            tempGuesses[p.id] = (cleanVal.length > 3 && !['1','x','2'].includes(cleanVal)) 
                                ? cleanVal.charAt(0).toUpperCase() + cleanVal.slice(1).toLowerCase() 
                                : cleanVal.toUpperCase(); // För 1, X, 2 -> 1, X, 2
                        }
                    }
                }

                if (rowHasData) {
                    const labelCols = row.slice(0, firstPCol).filter(x => {
                        if(x === null || x === undefined) return false;
                        const s = String(x).trim().toLowerCase();
                        return s !== "" && s !== "1 x 2" && s !== "1x2" && s !== "resultat" && s !== "datum" && s !== "grupp" && s !== "gruppspel";
                    }).map(x => String(x).trim());
                    
                    let rowLabelText = "";

                    // Fix: Bygger en snyggare titel för Gruppspelsmatcherna (Datum | Gr X: Match)
                    if (currentSection === 'group') {
                        const matchStr = labelCols.find(l => l.includes("-"));
                        if (matchStr) {
                            const otherCols = labelCols.filter(l => l !== matchStr);
                            const formattedOther = otherCols.map(c => (c.length === 1 ? `Gr ${c.toUpperCase()}` : c));
                            rowLabelText = `${formattedOther.join(" | ")}${formattedOther.length > 0 ? ': ' : ''}${matchStr}`;
                        } else {
                            rowLabelText = labelCols.join(" | ") || `Match rad ${r + 1}`;
                        }
                    } else {
                        rowLabelText = labelCols.join(" | ") || `Match rad ${r + 1}`;
                    }

                    rowLabels[currentSection].push(rowLabelText);

                    participants.forEach(p => {
                        p.guesses[currentSection].push(tempGuesses[p.id] || "");
                    });
                }
            }

            statsContent.innerHTML = `
                <div class="mb-1"><span class="text-white font-bold text-base">${participants.length}</span> spelare inlästa.</div>
                <p class="text-[11px] text-sky-500 animate-pulse mt-2">Graf skapad. Välj spelare.</p>
            `;

            selectedNodeId = null;
            hoveredNodeId = null;
            
            recalculateLinks();
            initGraph();
            generateStatsDashboard();

        } catch (err) {
            console.error(err);
            statsContent.innerHTML = `<p class="text-red-400 text-xs">Fel: ${err.message}</p>`;
        }
    }

    // --- Beräkna relationer (För graf) ---
    function recalculateLinks() {
        const filters = {
            group: document.getElementById('f-group').checked,
            '16del': document.getElementById('f-16del').checked,
            '8del': document.getElementById('f-8del').checked,
            kvarts: document.getElementById('f-kvarts').checked,
            semi: document.getElementById('f-semi').checked,
            final: document.getElementById('f-final').checked,
            vinnare: document.getElementById('f-vinnare').checked
        };

        allLinks = [];

        for (let i = 0; i < participants.length; i++) {
            for (let j = i + 1; j < participants.length; j++) {
                const p1 = participants[i];
                const p2 = participants[j];
                
                let totalMatches = 0;
                let totalPossible = 0;

                for (const [category, active] of Object.entries(filters)) {
                    if (!active) continue;

                    if (category === 'group') {
                        for (let k = 0; k < p1.guesses.group.length; k++) {
                            const g1 = p1.guesses.group[k];
                            const g2 = p2.guesses.group[k];
                            if (g1 !== "" && g2 !== "") {
                                totalPossible++;
                                if (g1 === g2) totalMatches++;
                            }
                        }
                    } else {
                        let p1Teams = p1.guesses[category].filter(x => x !== "");
                        let p2Teams = p2.guesses[category].filter(x => x !== "");
                        
                        let matches = 0;
                        let p2Copy = [...p2Teams];
                        
                        for(let team of p1Teams) {
                            let idx = p2Copy.indexOf(team);
                            if(idx !== -1) {
                                matches++;
                                p2Copy.splice(idx, 1);
                            }
                        }
                        totalMatches += matches;
                        totalPossible += Math.max(p1Teams.length, p2Teams.length); 
                    }
                }

                if (totalPossible > 0) {
                    allLinks.push({
                        source: p1.id, target: p2.id,
                        matches: totalMatches, total: totalPossible,
                        percentage: (totalMatches / totalPossible) * 100
                    });
                }
            }
        }
    }

    // --- Statistik Dashboard ---
    function generateStatsDashboard() {
        if(participants.length === 0) return;

        const getTop = (category) => {
            const counts = {};
            participants.forEach(p => {
                p.guesses[category].forEach(guess => {
                    if (guess && guess !== "") counts[guess] = (counts[guess] || 0) + 1;
                });
            });
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
            return { sorted };
        };

        const categoriesToDisplay = [
            { key: 'vinnare', title: 'Vem vinner VM?', max: 5, color: 'bg-yellow-500' },
            { key: 'final', title: 'Vilka når Finalen?', max: 8, color: 'bg-sky-500' },
            { key: 'semi', title: 'Vilka når Semifinal?', max: 8, color: 'bg-emerald-500' },
            { key: 'kvarts', title: 'Vilka når Kvartsfinal?', max: 10, color: 'bg-indigo-500' },
            { key: '8del', title: 'Åttondelsfinalister', max: 10, color: 'bg-slate-500' },
            { key: '16del', title: '16-delsfinalister', max: 10, color: 'bg-slate-600' }
        ];

        let html = `<h2 class="text-3xl font-bold text-white mb-8 border-b border-slate-700 pb-4">De vanligaste gissningarna</h2>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;

        categoriesToDisplay.forEach(cat => {
            const { sorted } = getTop(cat.key);
            if (sorted.length === 0) return;

            html += `
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-5 shadow-lg">
                    <h3 class="text-lg font-bold text-slate-100 mb-4">${cat.title}</h3>
                    <div class="space-y-3">
            `;

            sorted.slice(0, cat.max).forEach((item, index) => {
                const team = item[0];
                const count = item[1];
                const percentage = Math.round((count / participants.length) * 100); 
                const safeTeam = team.replace(/'/g, "\\'"); 
                
                html += `
                    <div class="group cursor-pointer p-1 -m-1 rounded hover:bg-slate-700/50 transition-colors" 
                         onclick="showVoters('${cat.key}', '${safeTeam}')" title="Klicka för att se vilka som gissat på detta">
                        <div class="flex justify-between text-sm mb-1">
                            <span class="font-medium group-hover:text-sky-400 transition-colors ${index === 0 && cat.key==='vinnare' ? 'text-yellow-400' : 'text-slate-300'}">${index+1}. ${team}</span>
                            <span class="text-slate-400">${count} st <span class="text-xs">(${percentage}%)</span></span>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden group-hover:ring-1 ring-sky-500/50">
                            <div class="${cat.color} h-2 stat-bar" style="width: 0%" data-width="${percentage}%"></div>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
        });
        
        if (rowLabels.group && rowLabels.group.length > 0) {
            let groupStats = [];
            for(let i=0; i<rowLabels.group.length; i++) {
                let counts = {'1':0, 'X':0, '2':0};
                let total = 0;
                participants.forEach(p => {
                    const g = p.guesses.group[i];
                    if(g === '1' || g === 'X' || g === '2') {
                        counts[g]++;
                        total++;
                    }
                });
                if(total > 0) {
                    let topGuess = '1';
                    let maxVotes = counts['1'];
                    if(counts['X'] > maxVotes) { topGuess = 'X'; maxVotes = counts['X']; }
                    if(counts['2'] > maxVotes) { topGuess = '2'; maxVotes = counts['2']; }
                    
                    groupStats.push({
                        match: rowLabels.group[i],
                        topGuess: topGuess,
                        maxVotes: maxVotes,
                        total: total,
                        percentage: Math.round((maxVotes/total)*100),
                        index: i
                    });
                }
            }
            
            // Sortera efter högst enighet i procent
            groupStats.sort((a,b) => b.percentage - a.percentage);
            
            html += `<h2 class="text-2xl font-bold text-white mt-10 mb-6 border-b border-slate-700 pb-2">Säkraste Gruppspelsmatcherna (Topp 12)</h2>`;
            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">`;
            
            groupStats.slice(0, 12).forEach(stat => {
                const color = stat.topGuess === '1' ? 'bg-sky-500' : stat.topGuess === 'X' ? 'bg-amber-500' : 'bg-emerald-500';
                const textColor = stat.topGuess === '1' ? 'text-sky-400' : stat.topGuess === 'X' ? 'text-amber-400' : 'text-emerald-400';
                const escapedMatch = stat.match.replace(/'/g, "\\'");
                
                html += `
                <div class="bg-slate-800 rounded-xl border border-slate-700 p-4 shadow-lg group hover:border-slate-500 transition-colors cursor-pointer" 
                     onclick="showGroupVoters(${stat.index}, '${escapedMatch}')">
                    <div class="text-xs text-slate-400 mb-2 truncate" title="${stat.match}">${stat.match}</div>
                    <div class="flex items-end justify-between mb-2">
                        <div class="text-2xl font-black ${textColor}">${stat.topGuess}</div>
                        <div class="text-sm text-slate-300">${stat.maxVotes} av ${stat.total} röster</div>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden group-hover:ring-1 ring-slate-500">
                        <div class="${color} h-2 stat-bar" style="width: 0%" data-width="${stat.percentage}%"></div>
                    </div>
                </div>
                `;
            });
            html += `</div>`;
        }

        html += `</div>`;
        statsDashboard.innerHTML = html;

        setTimeout(() => {
            document.querySelectorAll('.stat-bar').forEach(bar => {
                bar.style.width = bar.getAttribute('data-width');
            });
        }, 50);
    }

    function showVoters(category, team) {
        const voters = participants
            .filter(p => p.guesses[category].includes(team))
            .map(p => ({id: p.id, name: p.name}))
            .sort((a,b) => a.name.localeCompare(b.name));
        
        const catNames = {vinnare:'Vinnare', final:'Final', semi:'Semifinal', kvarts:'Kvartsfinal', '8del':'Åttondelsfinal', '16del':'16-delsfinal'};
        
        let html = `
            <div class="bg-slate-700/30 p-6 rounded-lg text-center mb-6 border border-slate-700/50">
                <div class="text-4xl font-bold text-white mb-2">${voters.length}</div>
                <div class="text-slate-400">
                    personer tror på <span class="text-sky-400 font-bold text-lg">${team}</span> i ${catNames[category] || category}
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center">`;
        
        voters.forEach(v => {
            html += `<span class="bg-slate-700 border border-slate-600 px-4 py-2 rounded-full text-sm font-medium text-slate-200 cursor-pointer hover:bg-sky-500 hover:text-white transition-colors" 
                           onclick="closeModal(); selectNodeAndGoToGraph('${v.id}');">${v.name}</span>`;
        });
        
        html += `</div>`;
        openModal(`Vem röstade på ${team}?`, html);
    }

    function showGroupVoters(matchIndex, matchName) {
        let voters = {'1':[], 'X':[], '2':[]};
        participants.forEach(p => {
            const g = p.guesses.group[matchIndex];
            if(voters[g]) voters[g].push(p);
        });
        
        const renderList = (list) => {
            if(list.length === 0) return `<span class="text-slate-500 italic text-xs">Inga röster</span>`;
            return list.map(v => `<span class="bg-slate-700 border border-slate-600 px-3 py-1 rounded-full text-xs text-slate-200 cursor-pointer hover:bg-sky-500 hover:text-white transition-colors" onclick="closeModal(); selectNodeAndGoToGraph('${v.id}');">${v.name}</span>`).join("");
        };

        let html = `
            <div class="mb-6 text-center text-slate-300 text-base font-medium border-b border-slate-700 pb-4">${matchName}</div>
            <div class="grid grid-cols-3 gap-2 md:gap-4">
                <div class="bg-slate-700/30 p-2 md:p-4 rounded-xl border border-slate-600/50 flex flex-col">
                    <div class="text-center font-black text-sky-400 mb-1 text-2xl">1</div>
                    <div class="text-center text-xs text-slate-400 mb-4 pb-2 border-b border-slate-600/50">${voters['1'].length} röster</div>
                    <div class="flex flex-wrap justify-center gap-1.5">${renderList(voters['1'])}</div>
                </div>
                <div class="bg-slate-700/30 p-2 md:p-4 rounded-xl border border-slate-600/50 flex flex-col">
                    <div class="text-center font-black text-amber-400 mb-1 text-2xl">X</div>
                    <div class="text-center text-xs text-slate-400 mb-4 pb-2 border-b border-slate-600/50">${voters['X'].length} röster</div>
                    <div class="flex flex-wrap justify-center gap-1.5">${renderList(voters['X'])}</div>
                </div>
                <div class="bg-slate-700/30 p-2 md:p-4 rounded-xl border border-slate-600/50 flex flex-col">
                    <div class="text-center font-black text-emerald-400 mb-1 text-2xl">2</div>
                    <div class="text-center text-xs text-slate-400 mb-4 pb-2 border-b border-slate-600/50">${voters['2'].length} röster</div>
                    <div class="flex flex-wrap justify-center gap-1.5">${renderList(voters['2'])}</div>
                </div>
            </div>
        `;
        openModal(`Röstfördelning (1 X 2)`, html);
    }

    function selectNodeAndGoToGraph(nodeId) {
        btnTabGraph.click();
        selectNodeFromSidebar(nodeId);
    }

    // --- D3 Graf Logik ---
    function initGraph() {
        graphWrapper.innerHTML = '';
        const width = graphWrapper.clientWidth || 800;
        const height = graphWrapper.clientHeight || 600;

        svg = d3.select("#graph-wrapper").append("svg").attr("width", width).attr("height", height);

        svg.on("click", (event) => {
            if (event.target.tagName === 'svg' || event.target.tagName === 'rect') {
                selectedNodeId = null; updateHighlight();
                statsContent.innerHTML = `<p class="italic text-slate-500 text-xs">Välj en spelare i grafen.</p>`;
            }
        });

        svg.append("rect").attr("width", width).attr("height", height).attr("fill", "transparent");
        g = svg.append("g");
        svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => g.attr("transform", e.transform)));
            
        updateGraphThreshold();
    }

    function updateGraphThreshold() {
        const threshold = parseFloat(thresholdSlider.value);
        if (simulation) simulation.stop();
        
        linksData = allLinks.filter(l => l.percentage >= threshold);
        g.selectAll("*").remove();

        const width = graphWrapper.clientWidth || 800;
        const height = graphWrapper.clientHeight || 600;

        simulation = d3.forceSimulation(participants)
            .force("link", d3.forceLink(linksData).id(d => d.id).distance(d => Math.max(20, 300 - (d.percentage * 2.5))))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collide", d3.forceCollide().radius(30));

        link = g.append("g").attr("class", "links").selectAll("line").data(linksData).enter().append("line")
            .attr("class", "link").style("stroke-width", d => Math.max(1, (d.percentage - 20) / 10));

        node = g.append("g").attr("class", "nodes").selectAll("g").data(participants).enter().append("g")
            .attr("class", "node")
            .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
            .on("click", (e, d) => { e.stopPropagation(); selectNodeFromSidebar(d.id); })
            .on("mouseover", (e, d) => { hoveredNodeId = d.id; updateHighlight(); })
            .on("mouseout", () => { hoveredNodeId = null; updateHighlight(); });

        node.append("circle").attr("r", 15).attr("fill", d => colorScale(d.id)); 
        node.append("text").attr("dx", 18).attr("dy", ".35em").text(d => d.name);

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        updateHighlight();
    }

    function updateHighlight() {
        if (!hoveredNodeId && !selectedNodeId) {
            node.style("opacity", 1);
            node.selectAll("circle").style("stroke", "#1e293b").style("stroke-width", "2px");
            link.style("stroke-opacity", d => (d.percentage / 100) * 0.8)
                .style("stroke", d => d.percentage > 80 ? "#38bdf8" : (d.percentage > 60 ? "#0284c7" : "#475569"));
            return;
        }

        const activeId = hoveredNodeId || selectedNodeId;
        const connectedIds = new Set([activeId]);
        linksData.forEach(l => {
            if (l.source.id === activeId) connectedIds.add(l.target.id);
            if (l.target.id === activeId) connectedIds.add(l.source.id);
        });

        node.style("opacity", o => connectedIds.has(o.id) ? 1 : 0.15);
        node.selectAll("circle")
            .style("stroke", o => (o.id === selectedNodeId) ? "#facc15" : (o.id === hoveredNodeId) ? "#fff" : "#1e293b")
            .style("stroke-width", o => (o.id === selectedNodeId || o.id === hoveredNodeId) ? "4px" : "2px");

        link.style("stroke-opacity", o => (o.source.id === activeId || o.target.id === activeId) ? 1 : 0.05)
            .style("stroke", o => (o.source.id === activeId || o.target.id === activeId) ? "#38bdf8" : "#334155");
    }

    function selectNodeFromSidebar(id) {
        const d = participants.find(p => p.id === id);
        if(!d) return;
        
        selectedNodeId = d.id;
        
        const connections = allLinks.filter(l => (l.source.id === d.id || l.target.id === d.id) || (l.source === d.id || l.target === d.id));
        const mapped = connections.map(c => {
            const isSource = (c.source.id || c.source) === d.id;
            const targetObj = isSource ? c.target : c.source;
            return {
                id: targetObj.id || targetObj,
                name: targetObj.name || targetObj,
                percentage: c.percentage, matches: c.matches, total: c.total
            };
        }).sort((a, b) => b.percentage - a.percentage);

        let html = `
            <div class="flex items-center justify-between mb-1 pb-2 border-b border-slate-700/50">
                <h3 class="text-base font-bold text-yellow-400 truncate pr-2">${d.name}</h3>
                <span class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-300 cursor-pointer hover:bg-slate-600" onclick="selectedNodeId=null;updateHighlight();statsContent.innerHTML='<p class=\\\'italic text-slate-500 text-xs\\\'>Välj en spelare i grafen.</p>'">X</span>
            </div>
            
            <h4 class="text-xs font-semibold text-sky-400 mb-2 mt-3 uppercase tracking-wider">Mest lika tips:</h4>
            <ul class="space-y-1.5">
        `;

        if (mapped.length === 0) html += `<li class="text-slate-500 text-xs italic">Inga gemensamma data.</li>`;
        else {
            mapped.slice(0, 4).forEach((c, i) => {
                html += `
                    <li class="flex flex-col bg-slate-700/20 hover:bg-slate-700/40 transition-colors p-2 rounded border border-slate-700/50 cursor-pointer"
                        onclick="selectNodeFromSidebar('${c.id}')" title="Klicka för att gå till denna spelare">
                        <div class="flex justify-between items-center mb-1.5">
                            <span class="font-medium text-xs text-slate-200 hover:text-sky-400">${i+1}. ${c.name}</span>
                            <span class="text-xs text-white font-bold bg-slate-800 px-1.5 rounded">${c.percentage.toFixed(0)}%</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] text-slate-500">${c.matches} gemensamma val</span>
                            <button onclick="comparePlayers('${d.id}', '${c.id}'); event.stopPropagation();" 
                                    class="text-[10px] bg-sky-600 hover:bg-sky-500 text-white px-2 py-0.5 rounded transition-colors">
                                Jämför tips
                            </button>
                        </div>
                    </li>`;
            });
        }
        
        if(mapped.length > 4) {
            const least = mapped[mapped.length - 1];
            html += `
                <h4 class="text-xs font-semibold text-red-400 mb-2 mt-4 uppercase tracking-wider">Minst lik:</h4>
                <div class="flex flex-col bg-red-900/10 hover:bg-red-900/20 p-2 rounded border border-red-900/30 cursor-pointer transition-colors"
                     onclick="selectNodeFromSidebar('${least.id}')">
                    <div class="flex justify-between items-center mb-1.5">
                        <span class="font-medium text-xs text-slate-300 hover:text-red-300">${least.name}</span>
                        <span class="block text-xs text-red-400 font-bold bg-red-950 px-1.5 rounded">${least.percentage.toFixed(0)}%</span>
                    </div>
                    <div class="flex justify-end">
                        <button onclick="comparePlayers('${d.id}', '${least.id}'); event.stopPropagation();" 
                                class="text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-0.5 rounded transition-colors border border-slate-600">
                            Jämför tips
                        </button>
                    </div>
                </div>
            `;
        }
        statsContent.innerHTML = html + `</ul>`;
        updateHighlight();
    }

    function comparePlayers(id1, id2) {
        const p1 = participants.find(p => p.id === id1);
        const p2 = participants.find(p => p.id === id2);
        if(!p1 || !p2) return;

        let html = ``;

        if (rowLabels.group.length > 0) {
            html += `<h3 class="font-bold text-sky-400 mb-2 border-b border-slate-700 pb-1">Gruppspel (1 X 2)</h3>`;
            html += `<div class="bg-slate-700/20 rounded border border-slate-700/50 mb-6 overflow-hidden">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-800 border-b border-slate-700">
                                <tr>
                                    <th class="p-2 text-slate-400 font-medium">Match / Omgång</th>
                                    <th class="p-2 text-slate-200 font-bold">${p1.name}</th>
                                    <th class="p-2 text-slate-200 font-bold">${p2.name}</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-700/50">`;
            
            let groupMatches = 0, groupTotal = 0;
            for(let i=0; i<rowLabels.group.length; i++) {
                const g1 = p1.guesses.group[i] || "-";
                const g2 = p2.guesses.group[i] || "-";
                if(g1 === "-" && g2 === "-") continue; 
                
                groupTotal++;
                const isMatch = (g1 === g2);
                if (isMatch) groupMatches++;
                
                const matchClass = isMatch ? "text-emerald-400 font-bold bg-emerald-900/10" : "text-slate-300";
                
                html += `<tr class="${isMatch ? '' : 'bg-slate-800/20'} hover:bg-slate-700/40">
                             <td class="p-2 pr-4 text-slate-400 truncate max-w-[200px]" title="${rowLabels.group[i]}">${rowLabels.group[i]}</td>
                             <td class="p-2 ${matchClass}">${g1}</td>
                             <td class="p-2 ${matchClass}">${g2}</td>
                         </tr>`;
            }
            html += `</tbody></table>
                     <div class="bg-slate-800/80 p-2 text-right text-xs text-slate-400 border-t border-slate-700">
                        ${groupMatches} av ${groupTotal} lika (${Math.round((groupMatches/groupTotal)*100)}%) i Gruppspelet
                     </div></div>`;
        }

        const playoffCats = [
            {key:'16del', name:'16-delsfinal'}, {key:'8del', name:'Åttondelsfinal'}, 
            {key:'kvarts', name:'Kvartsfinal'}, {key:'semi', name:'Semifinal'}, 
            {key:'final', name:'Final'}, {key:'vinnare', name:'Vinnare'}
        ];
        
        html += `<h3 class="font-bold text-sky-400 mb-2 border-b border-slate-700 pb-1">Slutspel (Gemensamma lag)</h3>`;
        html += `<div class="grid grid-cols-1 gap-3">`;
        
        let anyPlayoff = false;
        playoffCats.forEach(cat => {
            const set1 = p1.guesses[cat.key].filter(x=>x);
            const set2 = p2.guesses[cat.key].filter(x=>x);
            if(set1.length === 0 && set2.length === 0) return;
            
            anyPlayoff = true;
            const matchTeams = set1.filter(t1 => set2.some(t2 => t2.toLowerCase() === t1.toLowerCase()));

            const formatTeams = (teams) => {
                if(teams.length === 0) return `<span class="text-slate-600 italic">Inget svar</span>`;
                return teams.map(t => {
                    const isMatch = matchTeams.some(mt => mt.toLowerCase() === t.toLowerCase());
                    return isMatch 
                        ? `<span class="inline-block bg-emerald-900/30 text-emerald-400 border border-emerald-800 px-1.5 py-0.5 rounded text-[10px] font-bold mr-1 mb-1">${t}</span>` 
                        : `<span class="inline-block bg-slate-700 text-slate-300 border border-slate-600 px-1.5 py-0.5 rounded text-[10px] mr-1 mb-1">${t}</span>`;
                }).join("");
            };

            html += `<div class="bg-slate-700/20 p-3 rounded border border-slate-700/50 flex flex-col md:flex-row md:items-start gap-4">
                        <div class="md:w-1/4 font-semibold text-slate-200 text-sm border-b md:border-b-0 md:border-r border-slate-600 pb-2 md:pb-0 md:pr-2">
                            ${cat.name}
                        </div>
                        <div class="md:w-3/4 grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-[10px] text-slate-400 mb-1 font-medium uppercase tracking-wide">${p1.name}</div>
                                <div class="flex flex-wrap">${formatTeams(set1)}</div>
                            </div>
                            <div>
                                <div class="text-[10px] text-slate-400 mb-1 font-medium uppercase tracking-wide">${p2.name}</div>
                                <div class="flex flex-wrap">${formatTeams(set2)}</div>
                            </div>
                        </div>
                     </div>`;
        });
        
        if(!anyPlayoff) html += `<p class="text-slate-500 italic text-xs">Inga slutspelel svarade för dessa spelare.</p>`;
        
        html += `</div>`;

        openModal(`Jämför Tips: <span class="text-slate-300 font-normal">${p1.name}</span> vs <span class="text-slate-300 font-normal">${p2.name}</span>`, html);
    }

    function dragstarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
    function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
    function dragended(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
</script>
</body>
</html>
